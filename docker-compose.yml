
services:
  hiddify:
    #only for local build and development
    #build: .

    #latest release version
    image: ghcr.io/riotwwks/hiddify-manager:latest

    #latest beta version
    #image: ghcr.io/RioTwWks/hiddify-manager:beta

    #latest build of current development
    # image: ghcr.io/RioTwWks/hiddify-manager:dev

    #specific version
    #image: ghcr.io/RioTwWks/hiddify-manager:v10.80.0
    ports:
      - "80:80"
      - "443:443"
    privileged: true
    cap_add:
      - NET_ADMIN
    volumes:
       - ./docker-data/:/hiddify-data/
    env_file:
      - ./docker.env
    environment:
      - HIDDIFY_DISABLE_UPDATE=true
      # REDIS_URI_MAIN and REDIS_URI_SSH will be set by docker-init.sh based on REDIS_PASSWORD
      # If REDIS_PASSWORD is not set or is "your-strong-password", Redis runs without password
      # and docker-init.sh sets REDIS_URI_MAIN=redis://redis:6379/0 (without password)
    #network_mode: host
    depends_on: 
      - mariadb
      - redis

  mariadb:
    image: mariadb:latest
    container_name: mariadb_container
    restart: always
    env_file:
      - ./docker.env
    environment:
      MARIADB_RANDOM_ROOT_PASSWORD: 1       # Root user password
      MYSQL_DATABASE: hiddifypanel             
      MYSQL_USER: hiddifypanel                     
    volumes:
      - ./docker-data/mariadb_data:/var/lib/mysql          # Persistent storage for database files

  redis:
    image: redis:latest
    container_name: redis_container
    restart: always
    env_file:
      - ./docker.env
    command: sh -c "if [ -n \"$REDIS_PASSWORD\" ] && [ \"$REDIS_PASSWORD\" != \"your-strong-password\" ]; then redis-server --requirepass \"$REDIS_PASSWORD\"; else redis-server; fi"
    volumes:
      - ./docker-data/redis_data:/data                # Persistent storage for Redis data
    